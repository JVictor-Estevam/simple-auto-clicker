<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="cursorFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d0d4ff"/>
    </linearGradient>
    <linearGradient id="btnFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5865F2"/>
      <stop offset="100%" style="stop-color:#3442C4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="3" dy="4" stdDeviation="5" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="btnshadow" x="-20%" y="-20%" width="160%" height="160%">
      <feDropShadow dx="2" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Button — positioned more to the left/top to leave room for cursor -->
  <g transform="translate(14, 120) rotate(-4)">
    <rect width="118" height="78" rx="14" fill="url(#btnFill)" filter="url(#btnshadow)"/>
    <rect x="8" y="6" width="102" height="18" rx="8" fill="#ffffff" opacity="0.15"/>
    <polyline points="24,42 44,58 94,24" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- Cursor tip lands at roughly (112, 142) — center-right of button -->
  <!-- Ripple at that point -->
  <g transform="translate(100, 138)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#5865F2" stroke-width="3.5" opacity="0.55"/>
    <circle cx="0" cy="0" r="21" fill="none" stroke="#5865F2" stroke-width="2" opacity="0.28"/>
    <circle cx="0" cy="0" r="5" fill="#5865F2" opacity="0.9" filter="url(#glow)"/>
  </g>

  <!-- CURSOR — tip anchored at (100,138), scaled down so it stays within canvas -->
  <g transform="translate(100, 138) rotate(15) scale(0.65)" filter="url(#shadow)">
    <!-- Outline -->
    <polygon
      points="0,0 0,118 24,94 42,138 62,130 44,86 78,86"
      fill="#0E0F13"
      stroke="#0E0F13"
      stroke-width="12"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <!-- White fill -->
    <polygon
      points="0,0 0,118 24,94 42,138 62,130 44,86 78,86"
      fill="url(#cursorFill)"
    />
    <!-- Accent tint -->
    <polygon
      points="7,14 7,98 24,78 40,118 50,114 34,72 64,72"
      fill="#5865F2"
      opacity="0.22"
    />
  </g>

</svg>
